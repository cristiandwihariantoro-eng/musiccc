<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nell Music Studio - Pro Dashboard</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <style>
        :root {
            --accent: #ff2d55;
            --glass: rgba(255, 255, 255, 0.12);
            --blur: blur(25px) saturate(180%); /* Sedikit dikurangi agar lebih enteng di HP low-end */
            --border: 0.5px solid rgba(255, 255, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: linear-gradient(135deg, #f2f2f7 0%, #ffffff 100%);
            background-attachment: fixed;
            color: #1c1c1e; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; 
            padding-bottom: 220px; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container { padding: 15px; max-width: 850px; margin: 0 auto; }

        /* Dashboard Stats */
        .dash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .dash-item { 
            background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: var(--border); padding: 12px 8px; border-radius: 20px; text-align: center;
        }
        .dash-item span { display: block; font-size: 16px; font-weight: 800; }
        .dash-item label { font-size: 9px; opacity: 0.5; font-weight: 700; text-transform: uppercase; }

        /* Pages & Animations */
        .section-page { display: none; }
        .section-page.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .swiper { border-radius: 28px; width: 100%; aspect-ratio: 16 / 9; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }

        .search-box { 
            background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: var(--border); padding: 12px 16px; border-radius: 18px; display: flex; align-items: center; gap: 10px; margin-bottom: 15px; 
        }
        .search-box input { border: none; outline: none; background: transparent; width: 100%; font-size: 16px; }

        /* Grid Music */
        .grid-music { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card { padding: 8px; border-radius: 24px; position: relative; background: var(--glass); border: var(--border); backdrop-filter: var(--blur); }
        .thumb-box { width: 100%; aspect-ratio: 1/1; border-radius: 18px; overflow: hidden; margin-bottom: 8px; cursor: pointer; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .like-btn { position: absolute; top: 12px; right: 12px; color: white; font-size: 18px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); z-index: 5; }
        .like-btn.active { color: var(--accent); }
        .btn-action { flex: 1; border: none; background: rgba(0,0,0,0.05); padding: 8px; border-radius: 12px; cursor: pointer; color: #1c1c1e; }

        /* Player & Nav */
        .player-wrapper { 
            position: fixed; bottom: 100px; left: 15px; right: 15px; border-radius: 24px; padding: 12px 18px; 
            background: rgba(255,255,255,0.7); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: var(--border); z-index: 1000; display: none; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; 
            padding: 12px 0 35px; background: rgba(255,255,255,0.8); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border-top: var(--border); z-index: 1001; 
        }
        .nav-item { text-align: center; color: rgba(0,0,0,0.3); font-size: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; z-index: 2000; align-items: flex-end; }
        .modal-content { 
            width: 100%; padding: 25px; border-radius: 30px 30px 0 0; 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px); border: var(--border); max-height: 85vh; overflow-y: auto; 
        }
        .modal-content input { width: 100%; padding: 14px; background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; margin-bottom: 10px; outline: none; }

        /* SweetAlert iOS Style Customization */
        .ios-alert-container .swal2-popup { border-radius: 20px !important; padding-top: 20px !important; }
    </style>
</head>
<body>

    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; padding: 15px 5px;">
            <div>
                <p style="font-size: 11px; font-weight: 800; opacity: 0.5;">FIBERGLASS V4.0</p>
                <h1 style="font-size: 26px; font-weight: 900; letter-spacing: -1px;">Nell<span style="color:var(--accent)">Studio</span></h1>
            </div>
            <div onclick="window.checkPass('studio')" style="width:40px; height:40px; border-radius:50%; background:var(--glass); display:grid; place-items:center; border:var(--border); backdrop-filter: var(--blur);">
                <i class="fas fa-plus"></i>
            </div>
        </header>

        <div class="dash-grid">
            <div class="dash-item"><span id="statSongs">0</span><label>Songs</label></div>
            <div class="dash-item"><span id="statArtist">0</span><label>Artists</label></div>
            <div class="dash-item"><span id="statPlays">0</span><label>Plays</label></div>
        </div>

        <div class="search-box">
            <i class="fas fa-search" style="color:rgba(0,0,0,0.2)"></i>
            <input type="text" id="searchInput" placeholder="Cari musik favoritmu...">
        </div>

        <div id="homePage" class="section-page active">
            <div class="swiper" id="mainSwiper"><div class="swiper-wrapper" id="bannerWrapper"></div></div>
            <h3 style="margin-bottom: 15px; font-weight: 900;">Trending Now</h3>
            <div class="grid-music" id="musicGridHome"></div>
        </div>

        <div id="explorePage" class="section-page">
            <h3 style="margin-bottom: 15px; font-weight: 900;">Discover All</h3>
            <div class="grid-music" id="musicGridExplore"></div>
        </div>

        <div id="likedPage" class="section-page">
            <h3 style="margin-bottom: 15px; font-weight: 900;">Your Favorites</h3>
            <div class="grid-music" id="musicGridLiked"></div>
        </div>
    </div>

    <div class="player-wrapper" id="miniPlayer">
        <div id="pSeek" style="width: 100%; height: 3px; background: rgba(0,0,0,0.05); position: absolute; top: 0; left: 0; cursor: pointer;">
            <div id="pFill" style="height: 100%; background: var(--accent); width: 0%;"></div>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <img src="" id="pCover" style="width: 48px; height: 48px; border-radius: 12px; object-fit: cover;">
            <div style="flex: 1; min-width: 0;">
                <div id="pTitle" style="font-size: 14px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">-</div>
                <p id="pArtist" style="font-size: 11px; opacity: 0.5;"></p>
            </div>
            <div style="display:flex; gap:12px; align-items:center;">
                <i class="fas fa-step-backward" onclick="window.prevSong()" style="opacity:0.5;"></i>
                <div id="btnPlayPause" style="width: 42px; height: 42px; border-radius: 50%; background: var(--accent); color: white; display: grid; place-items: center;">
                    <i class="fas fa-play"></i>
                </div>
                <i class="fas fa-step-forward" onclick="window.nextSong()" style="opacity:0.5;"></i>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="window.changePage('home', this)"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item" onclick="window.changePage('explore', this)"><i class="fas fa-compass"></i>Explore</div>
        <div class="nav-item" onclick="window.changePage('liked', this)"><i class="fas fa-heart"></i>Liked</div>
    </nav>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h3 id="adminTitle" style="margin-bottom:15px; font-weight:900;">Studio Sync</h3>
            <form id="uploadForm">
                <input type="text" id="songTitle" placeholder="Judul Lagu" required>
                <input type="text" id="songArtist" placeholder="Nama Artis" required>
                <input type="text" id="ytLink" placeholder="YouTube Link (untuk Cover)">
                <input type="file" id="songFile" style="display:none;" accept="audio/*">
                <label for="songFile" id="fileLabel" style="display:block; padding:15px; border:2px dashed var(--accent); border-radius:12px; text-align:center; color: var(--accent); font-weight: 800; margin-bottom: 15px; background: rgba(255,45,85,0.05);">PILIH AUDIO (.mp3)</label>
                <button type="submit" id="btnUpload" style="width:100%; padding:16px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:900;">UPLOAD KE DATABASE</button>
                <button type="button" onclick="window.toggleAdmin()" style="width:100%; margin-top:12px; background:none; border:none; opacity:0.6;">Batal</button>
            </form>
        </div>
    </div>

    <audio id="mainAudio"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyDQbPGVmUN95ALjvKrPAeND_Vi09r9lPcs",
            authDomain: "webb-online.firebaseapp.com",
            databaseURL: "https://webb-online-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "webb-online",
            storageBucket: "webb-online.firebasestorage.app",
            messagingSenderId: "639981237091",
            appId: "1:639981237091:web:0b1fcb20b44848e9cdd956"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const musicRef = ref(database, 'songs');
        const audio = document.getElementById('mainAudio');
        
        window.allMusic = [];
        let currentSongId = null;
        let swiperInstance = null;
        let editId = null;

        // Sync Data Real-time
        onValue(musicRef, (snapshot) => {
            const data = snapshot.val();
            window.allMusic = [];
            if (data) {
                Object.keys(data).forEach(k => window.allMusic.push({id:k, ...data[k]}));
                // Sort by terbaru
                window.allMusic.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
            }
            updateStats();
            renderPages();
        });

        function updateStats() {
            document.getElementById('statSongs').innerText = window.allMusic.length;
            document.getElementById('statArtist').innerText = [...new Set(window.allMusic.map(m => m.artist))].length;
            document.getElementById('statPlays').innerText = window.allMusic.reduce((a, b) => a + (b.plays || 0), 0);
            renderBanner(window.allMusic);
        }

        function renderPages() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const likedIds = JSON.parse(localStorage.getItem('nell_liked') || '[]');
            let filtered = window.allMusic.filter(m => 
                (m.title||'').toLowerCase().includes(search) || 
                (m.artist||'').toLowerCase().includes(search)
            );

            renderGrid(filtered.slice(0, 10), 'musicGridHome');
            renderGrid(filtered, 'musicGridExplore');
            renderGrid(filtered.filter(m => likedIds.includes(m.id)), 'musicGridLiked');
        }

        function renderGrid(data, targetId) {
            const grid = document.getElementById(targetId);
            if(!grid) return;
            const likedIds = JSON.parse(localStorage.getItem('nell_liked') || '[]');
            
            if(data.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; opacity:0.5; padding:20px;">Tidak ada lagu.</p>`;
                return;
            }

            grid.innerHTML = data.map(item => `
                <div class="card">
                    <i class="fa${likedIds.includes(item.id)?'s':'r'} fa-heart like-btn ${likedIds.includes(item.id)?'active':''}" onclick="window.toggleLike('${item.id}')"></i>
                    <div class="thumb-box" onclick="window.playNow('${item.id}')">
                        <img src="${item.cover || 'https://via.placeholder.com/300'}" loading="lazy">
                    </div>
                    <div style="padding:0 4px;">
                        <h4 style="font-size:12px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.title}</h4>
                        <p style="font-size:10px; opacity:0.5; margin-bottom:10px;">${item.artist}</p>
                        <div style="display:flex; gap:5px;">
                            <button onclick="window.downloadFile('${item.url}', '${item.title}')" class="btn-action"><i class="fas fa-download"></i></button>
                            <button onclick="window.checkPass('edit', '${item.id}')" class="btn-action"><i class="fas fa-edit"></i></button>
                            <button onclick="window.checkPass('delete', '${item.id}')" class="btn-action"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderBanner(data) {
            const top = [...data].sort((a,b) => (b.plays||0) - (a.plays||0)).slice(0,5);
            if(top.length === 0) return;
            
            document.getElementById('bannerWrapper').innerHTML = top.map(i => `
                <div class="swiper-slide" onclick="window.playNow('${i.id}')">
                    <img src="${i.cover ? i.cover.replace('mqdefault', 'maxresdefault') : 'https://via.placeholder.com/800x450'}">
                </div>
            `).join('');
            
            if(swiperInstance) swiperInstance.destroy();
            swiperInstance = new Swiper('#mainSwiper', { 
                autoplay: { delay: 4000, disableOnInteraction: false }, 
                loop: true, 
                speed: 800,
                pagination: { el: '.swiper-pagination', clickable: true }
            });
        }

        // Global Player Functions
        window.playNow = (id) => {
            const song = window.allMusic.find(s => s.id === id);
            if(!song) return;
            currentSongId = id;
            audio.src = song.url; 
            audio.play().catch(e => console.log("Autoplay blocked or error"));
            
            // Update Plays
            update(ref(database, `songs/${id}`), { plays: (song.plays || 0) + 1 });
            
            document.getElementById('miniPlayer').style.display = 'block';
            document.getElementById('pTitle').innerText = song.title;
            document.getElementById('pArtist').innerText = song.artist;
            document.getElementById('pCover').src = song.cover;
            document.getElementById('btnPlayPause').innerHTML = '<i class="fas fa-pause"></i>';
        };

        window.nextSong = () => {
            const idx = window.allMusic.findIndex(s => s.id === currentSongId);
            if(idx === -1) return;
            const nextIdx = (idx + 1) % window.allMusic.length;
            window.playNow(window.allMusic[nextIdx].id);
        };

        window.prevSong = () => {
            const idx = window.allMusic.findIndex(s => s.id === currentSongId);
            if(idx === -1) return;
            const prevIdx = (idx - 1 + window.allMusic.length) % window.allMusic.length;
            window.playNow(window.allMusic[prevIdx].id);
        };

        window.toggleLike = (id) => {
            let liked = JSON.parse(localStorage.getItem('nell_liked') || '[]');
            liked = liked.includes(id) ? liked.filter(i => i !== id) : [...liked, id];
            localStorage.setItem('nell_liked', JSON.stringify(liked));
            renderPages();
        };

        window.downloadFile = async (url, title) => {
            Swal.fire({title:'Menyiapkan Download...', didOpen:()=>Swal.showLoading()});
            try { 
                const res = await fetch(url); 
                const b = await res.blob(); 
                const a = document.createElement('a'); 
                a.href = URL.createObjectURL(b); 
                a.download = `${title}.mp3`; 
                document.body.appendChild(a);
                a.click(); 
                document.body.removeChild(a);
            } catch(e) { window.open(url, '_blank'); }
            Swal.close();
        };

        // UI Helpers
        window.changePage = (id, el) => {
            document.querySelectorAll('.section-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id + 'Page').classList.add('active');
            el.classList.add('active');
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        window.toggleAdmin = () => {
            const m = document.getElementById('adminModal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
            if(m.style.display === 'none') {
                document.getElementById('uploadForm').reset();
                document.getElementById('adminTitle').innerText = "Studio Sync";
                editId = null;
            }
        };

        // Password & Auth
        window.checkPass = async (action, id = null) => {
            const { value: pass } = await Swal.fire({
                title: 'Akses Terbatas',
                input: 'password',
                inputPlaceholder: 'Password Studio',
                showCancelButton: true,
                confirmButtonColor: '#ff2d55'
            });

            if(pass === "Ishnelsen060906") {
                if(action === 'studio') { editId = null; window.toggleAdmin(); }
                if(action === 'delete') {
                    const confirm = await Swal.fire({title:'Hapus Lagu?', showCancelButton:true, confirmButtonText:'Ya, Hapus'});
                    if(confirm.isConfirmed) remove(ref(database, `songs/${id}`));
                }
                if(action === 'edit') {
                    const s = window.allMusic.find(m => m.id === id); 
                    editId = id;
                    document.getElementById('songTitle').value = s.title;
                    document.getElementById('songArtist').value = s.artist;
                    document.getElementById('adminTitle').innerText = "Update Content";
                    window.toggleAdmin();
                }
            } else if (pass !== undefined) {
                Swal.fire('Salah!', 'Password tidak valid.', 'error');
            }
        };

        // Form Handling
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnUpload');
            const file = document.getElementById('songFile').files[0];
            const yt = document.getElementById('ytLink').value;
            
            btn.disabled = true; btn.innerText = "Processing...";

            let thumb = 'https://via.placeholder.com/500';
            if(yt) {
                const vidId = yt.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/)?.[1];
                if(vidId) thumb = `https://img.youtube.com/vi/${vidId}/mqdefault.jpg`;
            }

            try {
                if(editId && !file) {
                    await update(ref(database, `songs/${editId}`), { 
                        title: document.getElementById('songTitle').value, 
                        artist: document.getElementById('songArtist').value, 
                        cover: thumb 
                    });
                } else {
                    if(!file) throw new Error("File audio wajib ada untuk upload baru.");
                    
                    const fd = new FormData(); 
                    fd.append('chat_id', '@asuakaba'); 
                    fd.append('video', file);
                    
                    const res = await fetch(`https://api.telegram.org/bot8625201664:AAGeG3ZtnvcyrPLpWCKhkSDcx6hS7rcL3ig/sendVideo`, {method:'POST', body:fd});
                    const tg = await res.json();
                    
                    if(!tg.ok) throw new Error("Gagal upload ke CDN");

                    const pRes = await fetch(`https://api.telegram.org/bot8625201664:AAGeG3ZtnvcyrPLpWCKhkSDcx6hS7rcL3ig/getFile?file_id=${tg.result.video.file_id}`);
                    const path = await pRes.json();
                    const cdn = `https://api.telegram.org/file/bot8625201664:AAGeG3ZtnvcyrPLpWCKhkSDcx6hS7rcL3ig/${path.result.file_path}`;
                    
                    const payload = { 
                        title: document.getElementById('songTitle').value, 
                        artist: document.getElementById('songArtist').value, 
                        url: cdn, 
                        cover: thumb 
                    };

                    if(editId) {
                        await update(ref(database, `songs/${editId}`), payload);
                    } else {
                        await push(musicRef, { ...payload, plays: 0, createdAt: serverTimestamp() });
                    }
                }
                window.toggleAdmin();
                Swal.fire('Success', 'Data tersinkronisasi!', 'success');
            } catch(e) { 
                Swal.fire('Error', e.message, 'error'); 
            } finally {
                btn.disabled = false; 
                btn.innerText = "UPLOAD KE DATABASE";
            }
        };

        // Audio Events
        audio.onended = () => window.nextSong();
        audio.ontimeupdate = () => { 
            if(!isNaN(audio.duration)) {
                document.getElementById('pFill').style.width = (audio.currentTime/audio.duration*100) + "%"; 
            }
        };

        document.getElementById('btnPlayPause').onclick = () => {
            if(audio.paused) { 
                audio.play(); 
                document.getElementById('btnPlayPause').innerHTML='<i class="fas fa-pause"></i>'; 
            } else { 
                audio.pause(); 
                document.getElementById('btnPlayPause').innerHTML='<i class="fas fa-play"></i>'; 
            }
        };

        document.getElementById('searchInput').oninput = () => renderPages();
        document.getElementById('songFile').onchange = function() { 
            if(this.files[0]) document.getElementById('fileLabel').innerText = "AUDIO READY: " + this.files[0].name.substring(0,10) + "..."; 
        };
    </script>
</body>
</html>
