<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nell Music - Professional Studio</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <style>
        :root {
            --accent: #ff2d55;
            --bg: #f2f2f7;
            --glass: rgba(255, 255, 255, 0.85);
            --text-main: #1c1c1e;
            --text-sub: #8e8e93;
            --dynamic-bg: #f2f2f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--dynamic-bg); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            padding-bottom: 240px; 
            transition: background 1s ease; /* Transisi warna background */
        }

        .container { padding: 15px; max-width: 800px; margin: 0 auto; }

        /* Banner Cinematic Fix */
        .banner-container { 
            width: 100%; height: 250px; border-radius: 30px; 
            overflow: hidden; margin-bottom: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            background: #e5e5ea;
        }
        .swiper-slide { position: relative; width: 100%; height: 100%; background: #000; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .banner-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.8) 10%, transparent 60%); 
            display: flex; flex-direction: column; justify-content: flex-end; 
            padding: 25px; color: white; 
        }

        .search-box { 
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 14px; border-radius: 16px; display: flex; 
            align-items: center; gap: 10px; margin-bottom: 25px; 
            border: 1px solid rgba(255,255,255,0.5);
        }
        .search-box input { border: none; outline: none; background: transparent; width: 100%; font-size: 16px; }

        /* Music Cards */
        .grid-music { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
        .card { 
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 12px; border-radius: 26px; border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 8px 20px rgba(0,0,0,0.03); opacity: 0; 
        }
        .thumb-box { width: 100%; aspect-ratio: 1/1; border-radius: 18px; overflow: hidden; margin-bottom: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover !important; }

        /* Full Interactive Player */
        .player-wrapper {
            position: fixed; bottom: 100px; left: 12px; right: 12px;
            background: var(--glass); backdrop-filter: blur(30px);
            border-radius: 28px; padding: 18px; z-index: 1000;
            display: none; border: 1px solid rgba(255,255,255,0.6); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }
        .up-next-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); font-weight: 700; margin-bottom: 8px; display: block; }
        
        .progress-bar { width: 100%; height: 6px; background: rgba(0,0,0,0.05); position: absolute; top: 0; left: 0; border-radius: 28px 28px 0 0; cursor: pointer; }
        #pFill { height: 100%; background: var(--accent); width: 0%; border-radius: 0 5px 5px 0; }

        .player-controls { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; padding: 0 10px; }
        .main-btns { display: flex; align-items: center; gap: 25px; }
        #btnPlayPause { width: 50px; height: 50px; border-radius: 50%; background: var(--accent); color: white; display: grid; place-items: center; font-size: 20px; box-shadow: 0 5px 15px rgba(255, 45, 85, 0.4); }

        /* Nav Bottom */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid rgba(0,0,0,0.05); z-index: 1001; }
        .nav-item { text-align: center; color: #8e8e93; text-decoration: none; font-size: 11px; font-weight: 600; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 4px; }

        /* Modal Edit Modern */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 2000; align-items: flex-end; backdrop-filter: blur(10px); }
        .modal-content { background: white; width: 100%; padding: 35px; border-radius: 35px 35px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); }
        .modal-content h3 { font-size: 24px; font-weight: 800; margin-bottom: 20px; text-align: center; }
        .modal-content input { width: 100%; padding: 16px; background: #f2f2f7; border: 1px solid #e5e5ea; border-radius: 15px; margin-bottom: 12px; font-size: 16px; outline: none; }
    </style>
</head>
<body>

    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0 20px;">
            <h1 style="font-size: 32px; font-weight: 900; letter-spacing: -1.5px;">Nell<span style="color:var(--accent)">Music</span></h1>
            <div id="statusNotif" style="font-size: 12px; color: var(--accent); font-weight: 600;"></div>
        </header>

        <div class="swiper banner-container" id="mainSwiper">
            <div class="swiper-wrapper" id="bannerWrapper"></div>
            <div class="swiper-pagination"></div>
        </div>

        <div class="search-box">
            <i class="fas fa-search" style="color:#aaa"></i>
            <input type="text" id="searchInput" placeholder="Search title, artist, or genre...">
        </div>

        <div class="grid-music" id="musicGrid"></div>
    </div>

    <div class="player-wrapper" id="miniPlayer">
        <div class="progress-bar" id="pSeek"><div id="pFill"></div></div>
        
        <span class="up-next-label" id="upNextInfo">Up Next: -</span>
        
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="" id="pCover" style="width: 55px; height: 55px; border-radius: 14px; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
            <div style="flex: 1; min-width: 0;">
                <div id="pTitle" style="font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Judul Lagu</div>
                <p id="pArtist" style="font-size: 12px; color: var(--text-sub);"></p>
            </div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <i class="fas fa-download" id="pDownloadBtn" style="color: #555; font-size: 20px; cursor: pointer;"></i>
            </div>
        </div>

        <div class="player-controls">
            <i class="fas fa-random" id="btnShuffle" style="font-size: 18px; color: #ccc; cursor: pointer;"></i>
            <div class="main-btns">
                <i class="fas fa-step-backward" onclick="window.playPrev()" style="font-size: 22px; cursor: pointer;"></i>
                <div id="btnPlayPause"><i class="fas fa-play"></i></div>
                <i class="fas fa-step-forward" onclick="window.playNext()" style="font-size: 22px; cursor: pointer;"></i>
            </div>
            <i class="fas fa-redo" id="btnRepeat" style="font-size: 18px; color: #ccc; cursor: pointer;"></i>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><i class="fas fa-play-circle"></i>Listen</a>
        <a href="javascript:void(0)" onclick="window.checkPass('upload')" class="nav-item"><i class="fas fa-plus-circle"></i>Upload</a>
        <a href="#" class="nav-item" onclick="Swal.fire('Studio Mode', 'Feature coming soon!', 'info')"><i class="fas fa-sliders-h"></i>Studio</a>
    </nav>

    <div id="adminModal" class="modal">
        <div class="modal-content" id="mContent">
            <h3>Music Studio</h3>
            <form id="uploadForm">
                <input type="text" id="songTitle" placeholder="Song Title" required>
                <input type="text" id="songArtist" placeholder="Artist" required>
                <input type="text" id="ytLink" placeholder="YouTube Link (Auto Thumbnail)">
                <input type="text" id="manualThumb" placeholder="Image URL">
                <label for="songFile" id="fileLabel" style="display:block; padding:20px; border:2px dashed var(--accent); border-radius:15px; text-align:center; margin-bottom:15px; cursor:pointer; color: var(--accent); font-weight: 700;">
                    <i class="fas fa-cloud-upload-alt"></i> SELECT AUDIO FILE
                </label>
                <input type="file" id="songFile" style="display:none;">
                <button type="submit" id="btnUpload" style="width:100%; padding:18px; background:var(--accent); color:white; border:none; border-radius:15px; font-weight:700; font-size: 16px; box-shadow: 0 10px 20px rgba(255,45,85,0.2);">SAVE TO CLOUD</button>
                <button type="button" onclick="window.toggleAdmin()" style="width:100%; background:none; border:none; color:#888; margin-top:15px;">CANCEL</button>
            </form>
        </div>
    </div>

    <audio id="mainAudio"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQbPGVmUN95ALjvKrPAeND_Vi09r9lPcs",
            authDomain: "webb-online.firebaseapp.com",
            databaseURL: "https://webb-online-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "webb-online",
            storageBucket: "webb-online.firebasestorage.app",
            messagingSenderId: "639981237091",
            appId: "1:639981237091:web:0b1fcb20b44848e9cdd956"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const musicRef = ref(database, 'songs');
        const TG_TOKEN = "8625201664:AAGeG3ZtnvcyrPLpWCKhkSDcx6hS7rcL3ig";
        const CHAT_ID = "@asuakaba";

        let musicList = [];
        let editId = null;
        let currentIdx = 0;
        let isShuffle = false;
        let isRepeat = false;
        let swiperInstance = null;
        const audio = document.getElementById('mainAudio');

        // Notification System
        if ("Notification" in window) {
            Notification.requestPermission().then(res => {
                if(res === 'granted') document.getElementById('statusNotif').innerText = "LIVE NOTIF ON";
            });
        }

        // Load Data
        let firstLoad = true;
        onValue(musicRef, (snapshot) => {
            const data = snapshot.val();
            const newList = [];
            if (data) Object.keys(data).forEach(key => newList.push({ id: key, ...data[key] }));
            
            if (!firstLoad && newList.length > musicList.length) {
                const newest = newList[newList.length - 1];
                if (Notification.permission === "granted") {
                    new Notification("Lagu Baru!", { body: `${newest.title} - ${newest.artist}`, icon: newest.cover });
                }
            }
            
            musicList = newList;
            firstLoad = false;
            const rev = [...musicList].reverse();
            renderMusic(rev);
            renderBanner(rev.slice(0, 6));
        });

        function renderBanner(data) {
            const wrapper = document.getElementById('bannerWrapper');
            wrapper.innerHTML = data.map(item => `
                <div class="swiper-slide" onclick="window.playNow('${item.id}')">
                    <img src="${item.cover}" onerror="this.src='https://via.placeholder.com/800x400?text=No+Image'">
                    <div class="banner-overlay">
                        <h2 style="font-weight:900; font-size: 26px;">${item.title}</h2>
                        <p style="opacity:0.9; font-size:14px;">${item.artist}</p>
                    </div>
                </div>
            `).join('');

            if (swiperInstance) swiperInstance.destroy();
            swiperInstance = new Swiper('#mainSwiper', {
                loop: true,
                autoplay: { delay: 4000, disableOnInteraction: false },
                pagination: { el: '.swiper-pagination', clickable: true },
                observer: true,
                observeParents: true
            });
        }

        function renderMusic(data) {
            const container = document.getElementById('musicGrid');
            container.innerHTML = data.map((item) => `
                <div class="card">
                    <div class="thumb-box"><img src="${item.cover}" onclick="window.playNow('${item.id}')" loading="lazy"></div>
                    <h4>${item.title}</h4>
                    <p>${item.artist}</p>
                    <div class="card-actions" style="display:flex; gap:5px;">
                        <button class="btn-card" onclick="window.checkPass('edit', '${item.id}')" style="flex:1; height:35px; border-radius:10px; border:none; background:#f2f2f7;"><i class="fas fa-edit"></i></button>
                        <button class="btn-card" onclick="window.checkPass('delete', '${item.id}')" style="flex:1; height:35px; border-radius:10px; border:none; background:#f2f2f7;"><i class="fas fa-trash"></i></button>
                        <button class="btn-card" onclick="window.downloadFile('${item.url}', '${item.title}')" style="flex:1; height:35px; border-radius:10px; border:none; background:#f2f2f7;"><i class="fas fa-download"></i></button>
                    </div>
                </div>
            `).join('');
            gsap.to(".card", { opacity: 1, y: 0, stagger: 0.1 });
        }

        // Logic & Protection
        window.checkPass = async (action, id = null) => {
            const { value: pass } = await Swal.fire({ title: 'Admin Verification', input: 'password', confirmButtonColor: '#ff2d55' });
            if (pass === "Ishnelsen060906") {
                if(action === 'upload') window.toggleAdmin();
                if(action === 'edit') window.editMusic(id);
                if(action === 'delete') window.deleteMusic(id);
            } else if(pass) {
                Swal.fire('Denied', 'Incorrect Password!', 'error');
            }
        };

        window.toggleAdmin = () => {
            const m = document.getElementById('adminModal');
            const c = document.getElementById('mContent');
            if(m.style.display === 'flex') {
                gsap.to(c, { y: 500, duration: 0.4, onComplete: () => m.style.display = 'none' });
            } else {
                m.style.display = 'flex';
                gsap.fromTo(c, { y: 500 }, { y: 0, duration: 0.4 });
            }
        };

        window.editMusic = (id) => {
            const song = musicList.find(s => s.id === id);
            editId = id;
            document.getElementById('songTitle').value = song.title;
            document.getElementById('songArtist').value = song.artist;
            window.toggleAdmin();
        };

        window.deleteMusic = (id) => {
            Swal.fire({ title: 'Delete Permanent?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ff2d55' })
                .then(r => { if(r.isConfirmed) remove(ref(database, `songs/${id}`)); });
        };

        // Advanced Player Controls
        window.playNow = (id) => {
            const song = musicList.find(s => s.id === id);
            currentIdx = musicList.findIndex(s => s.id === id);
            audio.src = song.url;
            audio.play();
            
            document.getElementById('miniPlayer').style.display = 'block';
            document.getElementById('pTitle').innerText = song.title;
            document.getElementById('pArtist').innerText = song.artist;
            document.getElementById('pCover').src = song.cover;
            document.getElementById('btnPlayPause').innerHTML = '<i class="fas fa-pause"></i>';
            document.getElementById('pDownloadBtn').onclick = () => window.downloadFile(song.url, song.title);
            
            // Update Background Ambient
            document.body.style.background = `linear-gradient(to bottom, #f2f2f7, #ffffff)`; // Reset first
            updateUpNext();
            gsap.from("#miniPlayer", { y: 100, opacity: 0 });
        };

        function updateUpNext() {
            let nextIdx = (currentIdx + 1) % musicList.length;
            if(isShuffle) nextIdx = Math.floor(Math.random() * musicList.length);
            const nextSong = musicList[nextIdx];
            document.getElementById('upNextInfo').innerText = `Up Next: ${nextSong.title}`;
        }

        window.playNext = () => {
            if (isShuffle) {
                currentIdx = Math.floor(Math.random() * musicList.length);
            } else {
                currentIdx = (currentIdx + 1) % musicList.length;
            }
            window.playNow(musicList[currentIdx].id);
        };

        window.playPrev = () => {
            currentIdx = (currentIdx - 1 + musicList.length) % musicList.length;
            window.playNow(musicList[currentIdx].id);
        };

        audio.onended = () => {
            if (isRepeat) { audio.currentTime = 0; audio.play(); }
            else { window.playNext(); }
        };

        document.getElementById('btnShuffle').onclick = function() {
            isShuffle = !isShuffle;
            this.style.color = isShuffle ? 'var(--accent)' : '#ccc';
            updateUpNext();
        };

        document.getElementById('btnRepeat').onclick = function() {
            isRepeat = !isRepeat;
            this.style.color = isRepeat ? 'var(--accent)' : '#ccc';
        };

        // Direct Download Fix
        window.downloadFile = async (url, filename) => {
            Swal.fire({ title: 'Preparing File...', didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(url);
                const blob = await res.blob();
                const bUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = bUrl;
                a.download = `${filename}.mp3`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                Swal.close();
            } catch (e) { window.open(url, '_blank'); Swal.close(); }
        };

        // Form Submission
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnUpload');
            const file = document.getElementById('songFile').files[0];
            const title = document.getElementById('songTitle').value;
            const artist = document.getElementById('songArtist').value;
            const ytLink = document.getElementById('ytLink').value;
            const manualThumb = document.getElementById('manualThumb').value;

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> UPLOADING...`;

            try {
                let thumbUrl = manualThumb || 'https://via.placeholder.com/500?text=Nell+Music';
                if (ytLink) {
                    const match = ytLink.match(/^.*(youtu.be\/|v\/|watch\?v=|\&v=)([^#\&\?]*).*/);
                    if (match) thumbUrl = `https://img.youtube.com/vi/${match[2]}/maxresdefault.jpg`;
                }

                if (editId && !file) {
                    await update(ref(database, `songs/${editId}`), { title, artist, cover: thumbUrl });
                } else {
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('video', file);
                    const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendVideo`, { method: 'POST', body: formData });
                    const tg = await res.json();
                    const pRes = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/getFile?file_id=${tg.result.video.file_id}`);
                    const path = await pRes.json();
                    const cdn = `https://api.telegram.org/file/bot${TG_TOKEN}/${path.result.file_path}`;

                    if(editId) await update(ref(database, `songs/${editId}`), { title, artist, url: cdn, cover: thumbUrl });
                    else await push(musicRef, { title, artist, url: cdn, cover: thumbUrl, createdAt: serverTimestamp() });
                }
                window.toggleAdmin();
                Swal.fire('Success!', 'Library Updated.', 'success');
            } catch (err) { Swal.fire('Error', 'Failed to upload.', 'error'); }
            finally { btn.disabled = false; btn.innerText = "SAVE TO CLOUD"; }
        };

        // Audio UI Controls
        document.getElementById('btnPlayPause').onclick = () => {
            if(audio.paused) { audio.play(); document.getElementById('btnPlayPause').innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); document.getElementById('btnPlayPause').innerHTML = '<i class="fas fa-play"></i>'; }
        };
        document.getElementById('pSeek').onclick = (e) => {
            const rect = document.getElementById('pSeek').getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        };
        audio.ontimeupdate = () => { document.getElementById('pFill').style.width = (audio.currentTime / audio.duration * 100) + "%"; };
        
        document.getElementById('searchInput').oninput = function() {
            const val = this.value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(val) ? 'block' : 'none';
            });
        };
        document.getElementById('songFile').onchange = function() {
            if(this.files[0]) document.getElementById('fileLabel').innerText = "AUDIO SELECTED!";
        };
    </script>
</body>
</html>
